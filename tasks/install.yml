---
- name: Ensure Webmin is supported on this platform
  ansible.builtin.assert:
    that:
      - ansible_facts.os_family == 'Debian' or ansible_facts.distribution == 'Rocky'
    fail_msg: "This role supports Debian, Ubuntu and Rocky Linux."

- name: Install Webmin on Debian/Ubuntu
  when: ansible_facts.os_family == 'Debian'
  block:
    - name: Install Debian dependencies
      ansible.builtin.apt:
        name:
          - perl
          - libnet-ssleay-perl
          - openssl
          - libauthen-pam-perl
          - libpam-runtime
          - libio-pty-perl
          - apt-show-versions
          - python3
          - gnupg
          - ca-certificates
        state: present
        update_cache: true

    - name: Remove legacy Webmin APT repository files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/webmin.list
        - /etc/apt/sources.list.d/webmin-prerelease.list

    - name: Check if /etc/apt/sources.list exists
      ansible.builtin.stat:
        path: /etc/apt/sources.list
      register: apt_sources_list_file

    - name: Remove legacy Webmin repository entries from sources.list
      ansible.builtin.lineinfile:
        path: /etc/apt/sources.list
        regexp: '^deb .*download\.webmin\.com/download/repository.*$'
        state: absent
      when: apt_sources_list_file.stat.exists

    - name: Download Webmin developers key
      ansible.builtin.get_url:
        url: https://download.webmin.com/developers-key.asc
        dest: /usr/share/keyrings/debian-webmin-developers.asc
        mode: '0644'

    - name: Convert Webmin developers key to keyring format
      ansible.builtin.command:
        argv:
          - gpg
          - --dearmor
          - --yes
          - --output
          - /usr/share/keyrings/debian-webmin-developers.gpg
          - /usr/share/keyrings/debian-webmin-developers.asc
      changed_when: false

    - name: Add Webmin stable APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [signed-by=/usr/share/keyrings/debian-webmin-developers.gpg]
          https://download.webmin.com/download/newkey/repository stable contrib
        state: present
        filename: webmin-stable
        update_cache: true

    - name: Install Webmin package on Debian/Ubuntu
      ansible.builtin.apt:
        name: webmin
        state: present
        update_cache: true
      notify: restart webmin

- name: Install Webmin on Rocky Linux
  when: ansible_facts.distribution == 'Rocky'
  block:
    - name: Import Webmin RPM signing key
      ansible.builtin.rpm_key:
        key: https://download.webmin.com/jcameron-key.asc
        state: present

    - name: Add Webmin YUM repository
      ansible.builtin.yum_repository:
        name: webmin
        description: Webmin repository
        baseurl: https://download.webmin.com/download/yum
        enabled: true
        gpgcheck: true
        gpgkey: https://download.webmin.com/jcameron-key.asc

    - name: Install Webmin package on Rocky Linux
      ansible.builtin.dnf:
        name: webmin
        state: present
      notify: restart webmin

- name: Configure Webmin Listen Address
  ansible.builtin.lineinfile:
    path: /etc/webmin/miniserv.conf
    regexp: "^listen="
    line: "listen={{ webmin_listen }}"
  notify: restart webmin

- name: Configure Webmin Port
  ansible.builtin.lineinfile:
    path: /etc/webmin/miniserv.conf
    regexp: "^port="
    line: "port={{ webmin_port }}"
  notify: restart webmin

- name: Configure Webmin SSL
  ansible.builtin.lineinfile:
    path: /etc/webmin/miniserv.conf
    regexp: "^ssl="
    line: "ssl={{ webmin_ssl }}"
  notify: restart webmin

- name: Configure Webmin Reverse Proxy Referer
  ansible.builtin.lineinfile:
    path: /etc/webmin/miniserv.conf
    regexp: "^referers="
    line: "referers={{ webmin_reverse_proxy_referer }}"
  when:
    - webmin_reverse_proxy_referer is defined
    - webmin_reverse_proxy_referer | length > 0
  notify: restart webmin

- name: Wait for Webmin to start
  ansible.builtin.wait_for:
    port: "{{ webmin_port }}"
    delay: 5
    timeout: 60
